<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eesti RenoHeat Explorer - Calculator + 3D</title>
  <style>
    :root {
      --ink: #17211f;
      --muted: #60706a;
      --line: #dbe3df;
      --panel: #ffffff;
      --page: #eef3f0;
      --green: #2f7150;
      --green-dark: #24593f;
      --blue: #2d5d8f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background: var(--page);
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      width: 100%;
      height: 100%;
      min-height: 100%;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .tabs {
      display: none;
      gap: 8px;
    }

    button,
    a {
      font: inherit;
    }

    button,
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--ink);
      background: #fff;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    button.active {
      color: #fff;
      border-color: var(--green);
      background: var(--green);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(560px, 58%) minmax(420px, 42%);
      min-height: 0;
    }

    .pane {
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
      min-height: 0;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }

    .pane:last-child {
      border-right: 0;
    }

    .pane-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      min-height: 42px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      background: #f8fbf9;
    }

    .pane-title {
      margin: 0;
      font-size: 13px;
      font-weight: 900;
      color: #2e403b;
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      padding: 3px 8px;
      color: #fff;
      background: var(--blue);
      font-size: 11px;
      font-weight: 900;
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      background: #fff;
    }

    @media (max-width: 980px) {
      body {
        overflow: hidden;
      }

      header {
        grid-template-columns: 1fr;
      }

      .tabs {
        display: flex;
      }

      .workspace {
        display: block;
        position: relative;
      }

      .pane {
        position: absolute;
        inset: 0;
        border-right: 0;
      }

      .pane[data-active="false"] {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Eesti RenoHeat Explorer</h1>
        <p class="subtitle">Full calculator and MaaRuum 3D building view in one workspace.</p>
      </div>
      <div class="tabs" aria-label="View switcher">
        <button id="showCalculator" class="active" type="button">Calculator</button>
        <button id="show3d" type="button">3D</button>
      </div>
    </header>

    <main class="workspace">
      <section id="calculatorPane" class="pane" data-active="true">
        <div class="pane-head">
          <p class="pane-title">Calculator</p>
          <span class="badge">Inputs + outputs</span>
        </div>
        <iframe title="Full heating and renovation calculator" src="index-full-calculator-clean.html"></iframe>
      </section>

      <section id="threePane" class="pane" data-active="true">
        <div class="pane-head">
          <p class="pane-title">MaaRuum 3D</p>
          <span class="badge">Building view</span>
        </div>
        <iframe title="MaaRuum 3D building view" src="index-maaruum-3d.html"></iframe>
      </section>
    </main>
  </div>

  <script>
    const calculatorPane = document.getElementById("calculatorPane");
    const threePane = document.getElementById("threePane");
    const showCalculator = document.getElementById("showCalculator");
    const show3d = document.getElementById("show3d");

    function setMobileView(view) {
      const calculatorActive = view === "calculator";
      calculatorPane.dataset.active = String(calculatorActive);
      threePane.dataset.active = String(!calculatorActive);
      showCalculator.classList.toggle("active", calculatorActive);
      show3d.classList.toggle("active", !calculatorActive);
    }

    showCalculator.addEventListener("click", () => setMobileView("calculator"));
    show3d.addEventListener("click", () => setMobileView("3d"));
  </script>
</body>
</html>
